services:
  app:
    image: ibrahimgamal10203040/todo-app:latest
    container_name: to-do-app
    environment:
      - MONGO_URI=${MONGO_URI}
    depends_on:
      - mongo
    expose:
      - "${APP_PORT}"
    restart: always

  mongo:
    image: mongo:6
    container_name: mongo
    volumes:
      - mongo-data:/data/db
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always

volumes:
  mongo-data:
