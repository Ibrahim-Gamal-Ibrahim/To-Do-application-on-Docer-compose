---
# defaults file for roles/Docker

Docker_official_GPG_key: https://download.docker.com/linux/ubuntu/gpg

Docker_repository: deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable

prerequists:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - software-properties-common

Docker_Engine_and_Compose:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin